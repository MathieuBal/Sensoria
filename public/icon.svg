<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141826" />
      <stop offset="100%" stop-color="#0b0d14" />
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <g filter="url(#glow)" style="mix-blend-mode: screen">
    <g transform="translate(256 256)">
      <g id="petal">
        <path d="M0 0 C 60 -40 120 -30 150 30 C 90 40 30 60 0 0 Z" fill="#40e0d0" opacity="0.85" />
      </g>
      <use href="#petal" transform="rotate(60)" fill="#5078ff" />
      <use href="#petal" transform="rotate(120)" />
      <use href="#petal" transform="rotate(180)" />
      <use href="#petal" transform="rotate(240)" />
      <use href="#petal" transform="rotate(300)" />
    </g>
  </g>
  <g transform="translate(256 256)" style="mix-blend-mode: screen">
    <circle r="26" fill="#ff6eb4" opacity="0.9" />
  </g>
