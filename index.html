<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0d14" />
    <meta name="description" content="Sensoria — galerie d'expériences interactives sensorielles." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>Sensoria — Mosaïque infinie</title>
  </head>
  <body>
    <canvas id="stage" aria-label="Tableau interactif Mosaïque infinie"></canvas>
    <!-- Transient FX layer (particles, reset bloom) drawn above the composition. -->
    <canvas id="fx" aria-hidden="true"></canvas>
    <!-- Depth vignette + soft cursor halo, both purely decorative. -->
    <div id="vignette" aria-hidden="true"></div>
    <div id="cursor" aria-hidden="true"></div>

    <!-- First-run hint, fades away on first interaction (§2 Immédiate). -->
    <div id="hint" class="hint">
      <span>Touchez et déplacez</span>
    </div>

    <!-- Home gallery (§2.1). Cards are injected from the scene registry. -->
    <section id="gallery" class="gallery">
      <header class="gallery__head">
        <h1 class="gallery__title">Sensoria</h1>
        <p class="gallery__sub">Galerie d'expériences interactives sensorielles</p>
      </header>
      <div id="gallery-grid" class="gallery__grid"></div>
    </section>

    <!-- Discreet return to the gallery (§2.1). -->
    <button id="back" class="back-btn" aria-label="Retour à la galerie">
      <span aria-hidden="true">←</span> Galerie
    </button>

    <!-- Discreet control to reveal settings (§2 Discret). -->
    <button id="menu-toggle" class="menu-toggle" aria-label="Réglages" title="Réglages (Échap)">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="12" cy="5" r="1.8" fill="currentColor" />
        <circle cx="12" cy="12" r="1.8" fill="currentColor" />
        <circle cx="12" cy="19" r="1.8" fill="currentColor" />
      </svg>
    </button>

    <!-- Floating frosted-glass panel (§7 Direction artistique). -->
    <aside id="panel" class="panel" hidden>
      <header class="panel__head">
        <h1 id="scene-title">Tableau</h1>
        <button id="panel-close" class="icon-btn" aria-label="Fermer">✕</button>
      </header>

      <section class="control">
        <span class="control__label">Palette</span>
        <div id="palettes" class="seg" role="group" aria-label="Palette"></div>
      </section>

      <section class="control">
        <span class="control__label" id="knob-label">Intensité</span>
        <div id="symmetry" class="seg" role="group" aria-label="Réglage"></div>
      </section>

      <section class="control control--row">
        <label class="switch">
          <input type="checkbox" id="auto" />
          <span>Mode automatique</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="reduced" />
          <span>Effets réduits</span>
        </label>
      </section>

      <section class="control control--actions">
        <button id="reset" class="btn">Reset</button>
        <button id="capture" class="btn">Capturer PNG</button>
        <button id="fullscreen" class="btn">Plein écran</button>
      </section>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
